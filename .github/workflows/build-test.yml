name: Build Test (Windows + macOS)

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest-xlarge
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Check sccache health
        id: sccache-check
        shell: bash
        run: |
          # Test sccache with a compile + stats check to verify storage is reachable
          TMPDIR="${RUNNER_TEMP:-/tmp}"
          echo 'fn main(){}' > "$TMPDIR/_sc_test.rs"
          RUSTC_WRAPPER=sccache SCCACHE_GHA_ENABLED=true rustc "$TMPDIR/_sc_test.rs" -o "$TMPDIR/_sc_test" 2>/dev/null || true
          STATS=$(sccache --show-stats 2>&1 || true)
          rm -f "$TMPDIR/_sc_test.rs" "$TMPDIR/_sc_test" "$TMPDIR/_sc_test.exe"
          if echo "$STATS" | grep -qi "error\|unavailable\|unreachable"; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::sccache storage unreachable, building without cache"
          elif echo "$STATS" | grep -q "Cache hits"; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "sccache is healthy"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::sccache stats unclear, building without cache"
          fi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build tv-mcp sidecar (macOS)
        if: matrix.platform == 'macos-latest-xlarge'
        env:
          TAURI_TARGET_TRIPLE: ${{ matrix.target }}
        run: bash scripts/build-sidecar.sh release

      - name: Build tv-mcp sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          TAURI_TARGET_TRIPLE: ${{ matrix.target }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          # Create placeholder so Tauri build.rs doesn't fail during compilation
          New-Item -ItemType File -Force -Path "src-tauri/binaries/tv-mcp-$env:TAURI_TARGET_TRIPLE.exe" | Out-Null
          # Build from src-tauri directory
          Push-Location src-tauri
          cargo build --release --bin tv-mcp --target $env:TAURI_TARGET_TRIPLE
          # Find the built binary
          $src = "target/$env:TAURI_TARGET_TRIPLE/release/tv-mcp.exe"
          if (-not (Test-Path $src)) {
            Write-Host "Binary not at $src, searching..."
            $found = Get-ChildItem -Recurse -Path target -Filter "tv-mcp.exe" | Where-Object { $_.DirectoryName -match "release" } | Select-Object -First 1
            if ($found) { $src = $found.FullName; Write-Host "Found at: $src" }
            else { throw "tv-mcp.exe not found in target directory" }
          }
          Copy-Item $src "binaries/tv-mcp-$env:TAURI_TARGET_TRIPLE.exe" -Force
          Pop-Location
          Write-Host "[build-sidecar] Built src-tauri/binaries/tv-mcp-$env:TAURI_TARGET_TRIPLE.exe"

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri (test compile only)
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.available == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.available == 'true' && 'true' || 'false' }}
          TAURI_TARGET_TRIPLE: ${{ matrix.target }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
          VITE_GITHUB_CLIENT_SECRET: ${{ secrets.VITE_GITHUB_CLIENT_SECRET }}
          VITE_AG_GRID_LICENSE_KEY: ${{ secrets.VITE_AG_GRID_LICENSE_KEY }}
        run: npx tauri build --target ${{ matrix.target }}
