name: Release (Windows + macOS)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest-xlarge
            target: aarch64-apple-darwin
            label: macOS-arm64
            suffix: arm64
          - platform: windows-latest-large
            target: x86_64-pc-windows-msvc
            label: Windows-x64
            suffix: win-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Check sccache health
        id: sccache-check
        shell: bash
        run: |
          # Test sccache with a compile + stats check to verify storage is reachable
          TMPDIR="${RUNNER_TEMP:-/tmp}"
          echo 'fn main(){}' > "$TMPDIR/_sc_test.rs"
          RUSTC_WRAPPER=sccache SCCACHE_GHA_ENABLED=true rustc "$TMPDIR/_sc_test.rs" -o "$TMPDIR/_sc_test" 2>/dev/null || true
          STATS=$(sccache --show-stats 2>&1 || true)
          rm -f "$TMPDIR/_sc_test.rs" "$TMPDIR/_sc_test" "$TMPDIR/_sc_test.exe"
          if echo "$STATS" | grep -qi "error\|unavailable\|unreachable"; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::sccache storage unreachable, building without cache"
          elif echo "$STATS" | grep -q "Cache hits"; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "sccache is healthy"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::sccache stats unclear, building without cache"
          fi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Verify version sync
        shell: bash
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          CARGO_VER=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAURI_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "package.json: $PKG_VER | Cargo.toml: $CARGO_VER | tauri.conf.json: $TAURI_VER"
          if [ "$PKG_VER" != "$CARGO_VER" ] || [ "$PKG_VER" != "$TAURI_VER" ]; then
            echo "::error::Version mismatch! All three files must match."
            exit 1
          fi

      # macOS: Import Apple signing certificate into CI keychain
      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest-xlarge'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build Tauri
        env:
          RUSTC_WRAPPER: ${{ steps.sccache-check.outputs.available == 'true' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache-check.outputs.available == 'true' && 'true' || 'false' }}
          TAURI_TARGET_TRIPLE: ${{ matrix.target }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
          VITE_GITHUB_CLIENT_SECRET: ${{ secrets.VITE_GITHUB_CLIENT_SECRET }}
          VITE_AG_GRID_LICENSE_KEY: ${{ secrets.VITE_AG_GRID_LICENSE_KEY }}
          # macOS code signing
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      # macOS: Notarize the DMG (the .app.tar.gz is for auto-updater which uses signature verification, not notarization)
      - name: Notarize macOS DMG
        if: matrix.platform == 'macos-latest-xlarge'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"

          DMG_PATH=$(find "$BUNDLE/dmg" -name "*.dmg" | head -1)
          if [ -n "$DMG_PATH" ]; then
            echo "Notarizing DMG: $DMG_PATH"

            xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait

            xcrun stapler staple "$DMG_PATH"
          fi

      # macOS: Clean up keychain
      - name: Clean up keychain
        if: matrix.platform == 'macos-latest-xlarge' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      # tv-mcp sidecar is already built by beforeBuildCommand (npm run build:sidecar)
      # and bundled inside the app by Tauri. Extract it for standalone download too.

      # Collect platform-specific artifacts into a flat folder
      - name: Collect artifacts (macOS)
        if: matrix.platform == 'macos-latest-xlarge'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          mkdir -p collected
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"

          # DMG for fresh install (already notarized + stapled)
          find "$BUNDLE/dmg" -name "*.dmg" -exec cp {} collected/ \;

          # Re-create .app.tar.gz from stapled .app and re-sign for auto-updater
          APP_PATH=$(find "$BUNDLE/macos" -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            APP_NAME=$(basename "$APP_PATH")
            TARGZ="$BUNDLE/macos/$APP_NAME.tar.gz"
            cd "$BUNDLE/macos"
            tar -czf "$APP_NAME.tar.gz" "$APP_NAME"
            cd -

            # Re-sign the new tar.gz for auto-updater verification
            if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
              npx tauri signer sign \
                --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
                ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+--password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"} \
                "$TARGZ"
            fi
          fi

          find "$BUNDLE/macos" -name "*.tar.gz" -exec cp {} collected/ \;
          find "$BUNDLE/macos" -name "*.tar.gz.sig" -exec cp {} collected/ \;

          # tv-mcp binary (from sidecar build)
          cp "src-tauri/binaries/tv-mcp-${{ matrix.target }}" collected/tv-mcp

          echo "Collected artifacts:"
          ls -la collected/

      - name: Collect artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p collected
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"

          # NSIS .exe installer (used for both fresh install AND auto-update)
          find "$BUNDLE/nsis" -name "*.exe" -exec cp {} collected/ \;

          # .exe.sig for auto-update signature verification
          find "$BUNDLE/nsis" -name "*.exe.sig" -exec cp {} collected/ \;

          # tv-mcp binary (from sidecar build)
          cp "src-tauri/binaries/tv-mcp-${{ matrix.target }}.exe" collected/tv-mcp.exe

          echo "Collected artifacts:"
          ls -la collected/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.suffix }}
          path: collected/*

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog from git log
        id: changelog
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            # First release — use all commits
            CHANGELOG=$(git log --oneline --no-merges --format="- %s" HEAD)
          else
            CHANGELOG=$(git log --oneline --no-merges --format="- %s" "${PREV_TAG}..HEAD")
          fi

          # Filter out version bump commits
          CHANGELOG=$(echo "$CHANGELOG" | grep -v "^- Bump version" | grep -v "^- Co-Authored-By" || true)

          # Truncate if too long (keep first 30 lines)
          CHANGELOG=$(echo "$CHANGELOG" | head -30)

          echo "Previous tag: ${PREV_TAG:-none}"
          echo "Changelog:"
          echo "$CHANGELOG"

          # Write to file for JSON embedding (avoids shell escaping issues)
          echo "$CHANGELOG" > /tmp/changelog.txt

          # Also write to output for GitHub release body
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Download macOS ARM artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-arm64
          path: dl/arm64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-win-x64
          path: dl/win-x64

      - name: List all downloaded files
        run: find dl -type f | sort

      - name: Prepare release files
        run: |
          mkdir -p release
          VERSION="${{ steps.version.outputs.version }}"

          # macOS (Apple Silicon)
          for f in dl/arm64/*.dmg; do [ -f "$f" ] && cp "$f" "release/TV.Client_${VERSION}_arm64.dmg"; done
          for f in dl/arm64/*.tar.gz; do [ -f "$f" ] && cp "$f" "release/TV.Client.app.tar.gz"; done
          for f in dl/arm64/*.tar.gz.sig; do [ -f "$f" ] && cp "$f" "release/TV.Client.app.tar.gz.sig"; done

          # Windows — rename to URL-safe names (no spaces)
          for f in dl/win-x64/*.exe; do
            # Skip tv-mcp.exe — handled separately
            [[ "$(basename "$f")" == "tv-mcp.exe" ]] && continue
            [ -f "$f" ] && cp "$f" "release/TV.Client_${VERSION}_x64-setup.exe"
          done
          for f in dl/win-x64/*.exe.sig; do
            [ -f "$f" ] && cp "$f" "release/TV.Client_${VERSION}_x64-setup.exe.sig"
          done

          # tv-mcp binaries
          [ -f dl/arm64/tv-mcp ] && cp dl/arm64/tv-mcp "release/tv-mcp-darwin-arm64"
          [ -f dl/win-x64/tv-mcp.exe ] && cp dl/win-x64/tv-mcp.exe "release/tv-mcp-windows-x64.exe"

          echo "Release files:"
          ls -la release/

      - name: Build latest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          # Read signatures
          MAC_ARM_SIG=$(cat release/TV.Client.app.tar.gz.sig 2>/dev/null || echo "")

          # Windows .exe.sig for auto-update
          WIN_SIG_FILE=$(find release -name "*x64-setup.exe.sig" | head -1)
          WIN_X64_SIG=$(cat "$WIN_SIG_FILE" 2>/dev/null || echo "")
          WIN_EXE_NAME="TV.Client_${VERSION}_x64-setup.exe"

          # Read changelog and JSON-escape it (newlines → \n, quotes → \")
          NOTES=$(cat /tmp/changelog.txt | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))")

          cat > release/latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": ${NOTES},
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "https://github.com/FrontToBackCulture/tv-client/releases/download/v${VERSION}/TV.Client.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_X64_SIG}",
                "url": "https://github.com/FrontToBackCulture/tv-client/releases/download/v${VERSION}/${WIN_EXE_NAME}"
              }
            }
          }
          ENDJSON

          echo "latest.json:"
          cat release/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## What's New

            ${{ steps.changelog.outputs.notes }}

            ## Downloads

            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `TV.Client_${{ steps.version.outputs.version }}_arm64.dmg` |
            | Windows (x64) | `.exe` installer |

            Existing installations will auto-update.

            ## MCP Server (for Claude Code)

            | Platform | Binary |
            |----------|--------|
            | macOS (Apple Silicon) | `tv-mcp-darwin-arm64` |
            | Windows (x64) | `tv-mcp-windows-x64.exe` |

            Download, make executable (`chmod +x`), and add to your Claude Code MCP config.
          files: release/*
          draft: false
          prerelease: false

      - name: Create briefing feed card
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SOURCE_REF="release:tv-client:${VERSION}"

          # Check if card already exists (dedup)
          EXISTING=$(curl -s \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "${SUPABASE_URL}/rest/v1/feed_cards?source_ref=eq.${SOURCE_REF}&select=id")

          if [ "$EXISTING" != "[]" ]; then
            echo "Feed card already exists for $SOURCE_REF, skipping"
            exit 0
          fi

          NOTES="${{ steps.changelog.outputs.notes }}"
          FEATURES_JSON=$(echo "$NOTES" | python3 -c "
          import sys, json
          lines = [l.strip().lstrip('- ') for l in sys.stdin.readlines() if l.strip().startswith('- ')]
          print(json.dumps(lines[:6]) if lines else 'null')")

          BODY_TEXT=$(echo "$NOTES" | head -3 | sed 's/^- //' | tr '\n' ' ' | sed 's/  */ /g')

          if echo "$VERSION" | grep -qE '\.0\.0$'; then BADGE="Major Release"; else BADGE="New Version"; fi

          PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({
            'card_type': 'release', 'category': 'event',
            'badge': '$BADGE', 'title': 'TV Desktop $VERSION',
            'body': '''$BODY_TEXT''',
            'source': 'tv-client', 'source_detail': 'Release',
            'source_ref': '$SOURCE_REF',
            'pinned': False, 'features': $FEATURES_JSON,
            'stats': [{'label': 'Version', 'value': '$VERSION'}],
            'created_by': 'github-action',
            'archived': False, 'series_id': None, 'series_order': 0
          }))")

          curl -s -X POST \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${SUPABASE_URL}/rest/v1/feed_cards"

          echo "Feed card created for tv-client $VERSION"
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
