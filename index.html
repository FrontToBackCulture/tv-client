<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Desktop</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="crash-screen" style="display:none;padding:2rem;font-family:monospace;background:#1a1a1a;color:#ef4444;height:100vh;overflow:auto">
